apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ include "demo-e2e.namespace" . }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
{{- if .Values.imagePullSecrets }}
{{ toYaml .Values.imagePullSecrets | indent 8 }}
{{- else }}
        []
{{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.backend.env.aspnetcoreEnvironment | quote }}
            - name: ConnectionStrings__DefaultConnection
              value: "Host=postgres;Port={{ .Values.postgres.service.port }};Database={{ .Values.postgres.auth.database }};Username={{ .Values.postgres.auth.username }};Password={{ .Values.postgres.auth.password }}"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ include "demo-e2e.namespace" . }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
